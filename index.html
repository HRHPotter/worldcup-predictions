<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 · Score Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --navy:        #0b1120;
      --navy-mid:    #111c30;
      --navy-card:   #162035;
      --navy-border: #1e2d47;
      --green:       #00d46a;
      --green-dim:   #00a854;
      --green-glow:  rgba(0, 212, 106, 0.18);
      --gold:        #f5c518;
      --white:       #f0f4ff;
      --muted:       #6b7fa3;
      --danger:      #ff4d6d;

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Inter', sans-serif;

      --radius-card:  12px;
      --radius-input: 8px;
      --input-size:   52px;

      --transition: 0.18s ease;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 15px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    .site-header {
      background: linear-gradient(180deg, #0d1829 0%, var(--navy) 100%);
      border-bottom: 1px solid var(--navy-border);
      padding: 28px 20px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 100% at 50% -10%, rgba(0,212,106,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-eyebrow {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 8px;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: clamp(34px, 8vw, 56px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--white);
    }

    .header-title span {
      color: var(--green);
    }

    .header-sub {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 0.04em;
    }

    /* ============================================================
       STICKY TOOLBAR
    ============================================================ */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 17, 32, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--navy-border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
      flex: 1;
    }

    .progress-label {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .progress-label strong {
      color: var(--green);
      font-size: 14px;
    }

    .progress-bar-track {
      height: 3px;
      background: var(--navy-border);
      border-radius: 99px;
      overflow: hidden;
      width: 100%;
      max-width: 200px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .save-indicator {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .save-indicator.visible { opacity: 1; }

    .btn {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-ghost {
      background: var(--navy-card);
      color: var(--muted);
      border: 1px solid var(--navy-border);
    }

    .btn-ghost:hover {
      background: var(--navy-border);
      color: var(--white);
    }

    .btn-green {
      background: var(--green);
      color: var(--navy);
    }

    .btn-green:hover {
      background: #00f07a;
      transform: translateY(-1px);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255,77,109,0.3);
    }

    .btn-danger:hover {
      background: rgba(255,77,109,0.1);
    }

    /* ============================================================
       MAIN CONTENT
    ============================================================ */
    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    /* ============================================================
       GROUP SECTION
    ============================================================ */
    .group-section {
      margin-bottom: 32px;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--navy-border);
    }

    .group-pill {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--green);
      color: var(--navy);
      padding: 3px 10px;
      border-radius: 4px;
    }

    .group-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--white);
    }

    /* ============================================================
       MATCH CARD
    ============================================================ */
    .match-card {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .match-card:has(.score-input:focus) {
      border-color: rgba(0,212,106,0.4);
      box-shadow: 0 0 0 1px rgba(0,212,106,0.12), 0 4px 24px rgba(0,212,106,0.07);
    }

    .match-card.predicted {
      border-color: rgba(0,212,106,0.2);
    }

    /* Team side */
    .team {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .team.away {
      flex-direction: row-reverse;
      text-align: right;
    }

    .team-flag {
      font-size: 24px;
      line-height: 1;
      flex-shrink: 0;
    }

    .team-info {
      min-width: 0;
    }

    .team-name {
      font-family: var(--font-display);
      font-size: clamp(14px, 3.5vw, 17px);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-date {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 2px;
      white-space: nowrap;
    }

    /* Score area */
    .score-area {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .score-input {
      width: var(--input-size);
      height: var(--input-size);
      background: var(--navy-mid);
      border: 2px solid var(--navy-border);
      border-radius: var(--radius-input);
      color: var(--white);
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 800;
      text-align: center;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      -moz-appearance: textfield;
      appearance: textfield;
      /* Prevent scroll on mobile */
      touch-action: manipulation;
    }

    .score-input::-webkit-inner-spin-button,
    .score-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .score-input:focus {
      border-color: var(--green);
      background: rgba(0,212,106,0.06);
      box-shadow: 0 0 0 3px var(--green-glow);
      color: var(--green);
    }

    .score-input.has-value {
      border-color: rgba(0,212,106,0.35);
      color: var(--green);
    }

    .score-input.has-value:not(:focus) {
      background: rgba(0,212,106,0.04);
    }

    .score-dash {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--navy-border);
    }

    /* ============================================================
       MODAL — Reset confirm
    ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.85);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      transform: translateY(12px);
      transition: transform 0.2s ease;
      text-align: center;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-icon {
      font-size: 40px;
      margin-bottom: 14px;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .modal-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .modal-actions .btn {
      flex: 1;
      padding: 10px 20px;
      font-size: 14px;
    }

    /* ============================================================
       TOAST
    ============================================================ */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy-card);
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 99px;
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .site-footer {
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid var(--navy-border);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 480px) {
      :root { --input-size: 46px; }

      .team-flag { font-size: 20px; }

      .score-input { font-size: 22px; }

      .match-card { padding: 12px 12px; gap: 8px; }

      .toolbar { padding: 8px 12px; }

      .btn { padding: 6px 10px; font-size: 12px; }

      .modal { padding: 24px 20px; }
    }

    @media (max-width: 360px) {
      :root { --input-size: 42px; }
      .score-dash { font-size: 18px; }
    }

    /* ============================================================
       REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>

        { id: "m40", homeTeam: "Brazil",        homeFlag: "🇧🇷", awayTeam: "Switzerland",   awayFlag: "🇨🇭", date: "28 Nov · 17:00" },
        { id: "m41", homeTeam: "Serbia",        homeFlag: "🇷🇸", awayTeam: "Switzerland",   awayFlag: "🇨🇭", date: "02 Dec · 18:00" },
        { id: "m42", homeTeam: "Cameroon",      homeFlag: "🇨🇲", awayTeam: "Brazil",        awayFlag: "🇧🇷", date: "02 Dec · 18:00" },

    {
      name: "Group H",
      matches: [
        { id: "m43", homeTeam: "Uruguay",       homeFlag: "🇺🇾", awayTeam: "South Korea",   awayFlag: "🇰🇷", date: "24 Nov · 14:00" },
        { id: "m44", homeTeam: "Portugal",      homeFlag: "🇵🇹", awayTeam: "Ghana",         awayFlag: "🇬🇭", date: "24 Nov · 17:00" },
        { id: "m45", homeTeam: "South Korea",   homeFlag: "🇰🇷", awayTeam: "Ghana",         awayFlag: "🇬🇭", date: "28 Nov · 14:00" },
        { id: "m46", homeTeam: "Portugal",      homeFlag: "🇵🇹", awayTeam: "Uruguay",       awayFlag: "🇺🇾", date: "28 Nov · 20:00" },
        { id: "m47", homeTeam: "Ghana",         homeFlag: "🇬🇭", awayTeam: "Uruguay",       awayFlag: "🇺🇾", date: "02 Dec · 22:00" },
        { id: "m48", homeTeam: "South Korea",   homeFlag: "🇰🇷", awayTeam: "Portugal",      awayFlag: "🇵🇹", date: "02 Dec · 22:00" },
      ]
    }
  ];
  </script>
  <script>
  /* ============================================================
     WORLD CUP PREDICTIONS — app.js (inlined)
  ============================================================ */

  const STORAGE_KEY = 'wc2026_predictions';

  /* --- State ------------------------------------------------- */
  let predictions = {};

  /* --- Load from localStorage -------------------------------- */
  function loadPredictions() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      predictions = raw ? JSON.parse(raw) : {};
    } catch (e) {
      predictions = {};
    }
  }

  /* --- Save to localStorage ---------------------------------- */
  function savePredictions() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(predictions));
      flashSaveIndicator();
    } catch (e) {
      console.warn('Could not save to localStorage:', e);
    }
  }

  /* --- Flash "Saved" indicator ------------------------------- */
  let saveTimer;
  function flashSaveIndicator() {
    const el = document.getElementById('save-indicator');
    el.classList.add('visible');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => el.classList.remove('visible'), 1800);
  }

  /* --- Update progress bar ----------------------------------- */
  function updateProgress() {
    const allMatches = FIXTURES.flatMap(g => g.matches);
    const total = allMatches.length;
    const filled = allMatches.filter(m =>
      predictions[m.id]?.home !== '' && predictions[m.id]?.home !== undefined &&
      predictions[m.id]?.away !== '' && predictions[m.id]?.away !== undefined
    ).length;

    document.getElementById('progress-count').textContent = filled;
    document.getElementById('progress-total').textContent = total;
    const pct = total > 0 ? (filled / total) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  /* --- Sanitise input value ---------------------------------- */
  function sanitiseScore(val) {
    const n = parseInt(val, 10);
    if (isNaN(n)) return '';
    return String(Math.min(20, Math.max(0, n)));
  }

  /* --- Handle score input change ----------------------------- */
  function handleScoreChange(matchId, side, inputEl) {
    const val = sanitiseScore(inputEl.value);
    inputEl.value = val;

    if (!predictions[matchId]) predictions[matchId] = { home: '', away: '' };
    predictions[matchId][side] = val;

    // Update styling
    inputEl.classList.toggle('has-value', val !== '');

    // Update card predicted state
    const card = inputEl.closest('.match-card');
    const isPredicted =
      predictions[matchId].home !== '' &&
      predictions[matchId].away !== '';
    card.classList.toggle('predicted', isPredicted);

    savePredictions();
    updateProgress();
  }

  /* --- Prevent invalid keys ---------------------------------- */
  function handleScoreKeydown(e) {
    // Allow: backspace, delete, tab, escape, enter, arrow keys, home, end
    const allowed = [
      'Backspace','Delete','Tab','Escape','Enter',
      'ArrowLeft','ArrowRight','ArrowUp','ArrowDown',
      'Home','End'
    ];
    if (allowed.includes(e.key)) return;
    // Allow digits 0-9
    if (/^\d$/.test(e.key)) return;
    // Block everything else
    e.preventDefault();
  }

  /* --- Keyboard: move between inputs with arrow keys --------- */
  function handleInputArrow(e, allInputs, idx) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      const next = allInputs[idx + 1];
      if (next) next.focus();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = allInputs[idx - 1];
      if (prev) prev.focus();
    }
  }

  /* --- Render all groups & matches --------------------------- */
  function renderFixtures() {
    const container = document.getElementById('matches-container');
    container.innerHTML = '';

    const allInputs = [];

    FIXTURES.forEach(group => {
      const section = document.createElement('section');
      section.className = 'group-section';

      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <span class="group-pill">Group</span>
        <span class="group-name">${escapeHtml(group.name)}</span>
      `;
      section.appendChild(header);

      group.matches.forEach(match => {
        const saved = predictions[match.id] || { home: '', away: '' };
        const isPredicted = saved.home !== '' && saved.away !== '';

        const card = document.createElement('div');
        card.className = `match-card${isPredicted ? ' predicted' : ''}`;
        card.setAttribute('data-match-id', match.id);

        card.innerHTML = `
          <div class="team home">
            <span class="team-flag" aria-hidden="true">${match.homeFlag}</span>
            <div class="team-info">
              <div class="team-name">${escapeHtml(match.homeTeam)}</div>
              <div class="match-date">${escapeHtml(match.date)}</div>
            </div>
          </div>

          <div class="score-area">
            <input
              class="score-input${saved.home !== '' ? ' has-value' : ''}"
              type="number"
              min="0" max="20" step="1"
              inputmode="numeric"
              pattern="[0-9]*"
              value="${escapeHtml(saved.home)}"
              aria-label="${escapeHtml(match.homeTeam)} score"
              data-match="${match.id}"
              data-side="home"
            />
            <span class="score-dash" aria-hidden="true">–</span>
            <input
              class="score-input${saved.away !== '' ? ' has-value' : ''}"
              type="number"
              min="0" max="20" step="1"
              inputmode="numeric"
              pattern="[0-9]*"
              value="${escapeHtml(saved.away)}"
              aria-label="${escapeHtml(match.awayTeam)} score"
              data-match="${match.id}"
              data-side="away"
            />
          </div>

          <div class="team away">
            <span class="team-flag" aria-hidden="true">${match.awayFlag}</span>
            <div class="team-info">
              <div class="team-name">${escapeHtml(match.awayTeam)}</div>
            </div>
          </div>
        `;

        section.appendChild(card);

        // Collect inputs for arrow-key navigation
        card.querySelectorAll('.score-input').forEach(inp => allInputs.push(inp));
      });

      container.appendChild(section);
    });

    // Attach events to all inputs
    allInputs.forEach((inp, idx) => {
      const matchId = inp.dataset.match;
      const side = inp.dataset.side;

      inp.addEventListener('input', () => handleScoreChange(matchId, side, inp));
      inp.addEventListener('keydown', e => {
        handleScoreKeydown(e);
        handleInputArrow(e, allInputs, idx);
      });
      // Select all on focus for quick editing
      inp.addEventListener('focus', () => inp.select());
      // Clamp on blur
      inp.addEventListener('blur', () => {
        if (inp.value !== '') inp.value = sanitiseScore(inp.value);
      });
    });
  }

  /* --- Export CSV -------------------------------------------- */
  function exportCSV() {
    const rows = [['Match ID', 'Home Team', 'Away Team', 'Home Score', 'Away Score', 'Date']];

    FIXTURES.forEach(group => {
      group.matches.forEach(match => {
        const p = predictions[match.id] || {};
        rows.push([
          match.id,
          match.homeTeam,
          match.awayTeam,
          p.home !== undefined && p.home !== '' ? p.home : '',
          p.away !== undefined && p.away !== '' ? p.away : '',
          match.date
        ]);
      });
    });

    const csv = rows.map(row =>
      row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
    ).join('\r\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'wc2026_predictions.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);

    showToast('CSV Downloaded ✓');
  }

  /* --- Reset confirm modal ----------------------------------- */
  function openResetModal() {
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-confirm').focus();
  }

  function closeResetModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function doReset() {
    predictions = {};
    savePredictions();
    renderFixtures();
    updateProgress();
    closeResetModal();
    showToast('Predictions Reset');
  }

  /* --- Toast ------------------------------------------------- */
  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  /* --- Escape HTML utility ----------------------------------- */
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  /* --- Wire up buttons --------------------------------------- */
  document.getElementById('btn-export').addEventListener('click', exportCSV);
  document.getElementById('btn-reset').addEventListener('click', openResetModal);
  document.getElementById('modal-cancel').addEventListener('click', closeResetModal);
  document.getElementById('modal-confirm').addEventListener('click', doReset);

  // Close modal on backdrop click
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeResetModal();
  });

  // Close modal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeResetModal();
  });

  /* --- INIT -------------------------------------------------- */
  loadPredictions();
  renderFixtures();
  updateProgress();
  </script>

</body>
